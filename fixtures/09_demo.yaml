# Jeu de données démo déterministe : comptes loggables, logements localisés,
# calendrier (jours bloqués) et réservations confirmées/en attente pour le visuel.
# Comptes : hote@test.io / voyageur@test.io  (mot de passe : password)

App\Entity\User:
  demo_host:
    email: 'hote@test.io'
    passwordHash: '<hashedPassword("password")>'
    phone: '0600000001'
    status: 'active'
    isEmailVerified: true
    is2faEnabled: false
    preferredLanguage: 'fr'
    preferredCurrency: 'EUR'
  demo_guest:
    email: 'voyageur@test.io'
    passwordHash: '<hashedPassword("password")>'
    phone: '0600000002'
    status: 'active'
    isEmailVerified: true
    is2faEnabled: false
    preferredLanguage: 'fr'
    preferredCurrency: 'EUR'

App\Entity\UserProfile:
  demo_profile_host:
    user: '@demo_host'
    firstName: 'Hélène'
    lastName: 'Hôte'
    birthDate: '<immutableDate("1985-04-12")>'
    bio: 'Hôte passionnée, je loue mes logements depuis 5 ans.'
    identityStatus: 'verified'
  demo_profile_guest:
    user: '@demo_guest'
    firstName: 'Victor'
    lastName: 'Voyageur'
    birthDate: '<immutableDate("1992-09-30")>'
    bio: 'Voyageur curieux à la recherche de beaux endroits.'
    identityStatus: 'verified'

App\Entity\UserRole:
  demo_role_host_h:
    user: '@demo_host'
    role: '@role_host'
  demo_role_host_g:
    user: '@demo_host'
    role: '@role_guest'
  demo_role_guest:
    user: '@demo_guest'
    role: '@role_guest'

App\Entity\Property:
