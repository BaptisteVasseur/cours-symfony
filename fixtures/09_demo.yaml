# Calendrier : nuits bloquées manuellement par l'hôte sur le studio de Paris
App\Entity\PropertyAvailability:
  demo_block_paris_1:
    property: '@demo_prop_paris'
    availableDate: '<immutableDate("2026-07-10")>'
    isAvailable: false
  demo_block_paris_2:
    property: '@demo_prop_paris'
    availableDate: '<immutableDate("2026-07-11")>'
    isAvailable: false
  demo_block_paris_3:
    property: '@demo_prop_paris'
    availableDate: '<immutableDate("2026-07-12")>'
    isAvailable: false
  demo_block_paris_4:
    property: '@demo_prop_paris'
    availableDate: '<immutableDate("2026-07-13")>'
    isAvailable: false
