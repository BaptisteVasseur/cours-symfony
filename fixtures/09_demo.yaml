App\Entity\Reservation:
  # Réservation confirmée : occupe le calendrier de la villa de Nice
  demo_res_nice_confirmed:
    property: '@demo_prop_nice'
    guest: '@demo_guest'
    checkinDate: '<immutableDate("2026-07-05")>'
    checkoutDate: '<immutableDate("2026-07-10")>'
    guestsCount: 4
    status: 'confirmed'
    totalPrice: '1410.00'
    cleaningFee: '80.00'
    serviceFee: '150.00'
    securityDeposit: '500.00'
    currency: 'EUR'
  # Demande en attente : visible dans le tableau de modération de l'hôte
  demo_res_lyon_pending:
    property: '@demo_prop_lyon'
    guest: '@demo_guest'
    checkinDate: '<immutableDate("2026-08-01")>'
    checkoutDate: '<immutableDate("2026-08-05")>'
    guestsCount: 3
    status: 'pending'
    totalPrice: '460.00'
    cleaningFee: '40.00'
    serviceFee: '45.00'
    securityDeposit: '250.00'
    currency: 'EUR'

App\Entity\ReservationStatusHistory:
  demo_history_nice:
    reservation: '@demo_res_nice_confirmed'
    oldStatus: 'pending'
    newStatus: 'confirmed'
