    status: 'published'
    maxGuests: 4
    bedrooms: 1
    beds: 2
    bathrooms: 1
    pricePerNight: '120.00'
    cleaningFee: '35.00'
    securityDeposit: '200.00'
    checkinTime: '<immutableTime(15, 15)>'
    checkoutTime: '<immutableTime(11, 11)>'
    instantBooking: true
  demo_prop_lyon:
    host: '@demo_host'
    cancellationPolicy: '@policy_moderate'
    title: 'Loft lumineux à Lyon Presqu''île'
    description: "Grand loft industriel avec mezzanine, en plein centre de Lyon. Commerces et restaurants à proximité immédiate."
    propertyType: 'loft'
    status: 'published'
    maxGuests: 6
    bedrooms: 2
    beds: 3
    bathrooms: 2
    pricePerNight: '95.00'
    cleaningFee: '40.00'
    securityDeposit: '250.00'
    checkinTime: '<immutableTime(16, 16)>'
    checkoutTime: '<immutableTime(10, 10)>'
    instantBooking: false
  demo_prop_nice:
    host: '@demo_host'
    cancellationPolicy: '@policy_strict'
    title: 'Villa avec piscine à Nice'
    description: "Superbe villa avec vue mer et piscine privée sur les hauteurs de Nice. Parfaite pour des vacances en famille."
