# Pièces d'identité rattachées aux voyageurs (1 par voyageur via <current()>).
App\Entity\UserDocument:
    document_{1..40}:
        user: '@guest_<current()>'
        type: '<randomElement(["piece_identite", "passeport", "permis_conduire"])>'
        fileUrl: 'https://storage.airbnb-clone.fr/documents/<uuid()>.pdf'
        verificationStatus: '<randomElement(["pending", "verified", "rejected"])>'
