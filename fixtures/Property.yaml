App\Entity\Property:
    property_{1..30}:
        host: "@mon_user_<numberBetween(1, 100)>"
        cancellationPolicy: "@cancellation_policy_<numberBetween(1, 3)>"
        title: "<randomElement(['Appartement cosy', 'Villa avec piscine', 'Studio lumineux', 'Maison proche plage', 'Logement moderne'])>"
        propertyType: "appartement"
        status: "published"
        maxGuests: 2
        bedrooms: 1
        beds: 1
        bathrooms: 1
        pricePerNight: "100.00"
        instantBooking: false
        createdAt: "<(new DateTimeImmutable())>"

App\Entity\PropertyMedia:
    property_media_{1..30}:
        property: "@property_<current()>"
        mediaType: "image"
        fileUrl: "<randomElement([
            'https://images.unsplash.com/photo-1540541338287-41700207dee6?auto=format&fit=crop&w=600&q=80',
            'https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=600&q=80',
            'https://images.unsplash.com/photo-1571896349842-33c89424de2d?auto=format&fit=crop&w=600&q=80',
            'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=600&q=80',
            'https://images.unsplash.com/photo-1615873968403-89e068629265?auto=format&fit=crop&w=600&q=80'
        ])>"
        sortOrder: 0
        isCover: true
        createdAt: "<(new DateTimeImmutable())>"
