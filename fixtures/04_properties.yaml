App\Entity\Property:
  property_1:
    host: '@user_1'
    cancellationPolicy: '@policy_flexible'
    title: 'Villa avec piscine vue mer à Nice'
    description: 'Magnifique villa provençale avec piscine privée et vue panoramique sur la mer. Idéale pour des vacances en famille ou entre amis. Terrasse ensoleillée, barbecue, et accès direct à la plage à 5 minutes à pied.'
    propertyType: 'villa'
    status: 'published'
    maxGuests: 8
    bedrooms: 4
    beds: 5
    bathrooms: 2
    pricePerNight: '320.00'
    cleaningFee: '60.00'
    securityDeposit: '400.00'
    instantBooking: true
    createdAt: '<dateTimeBetween("-1 year", "-1 month")>'
    address: '@address_1'
    rules: '@rules_1'

  property_2:
    host: '@user_2'
    cancellationPolicy: '@policy_moderate'
    title: 'Appartement moderne au cœur de Paris'
    description: 'Bel appartement haussmannien entièrement rénové, situé dans le Marais. Lumineux, décoré avec goût, à deux pas des musées et restaurants. Idéal pour découvrir Paris.'
    propertyType: 'apartment'
    status: 'published'
    maxGuests: 4
    bedrooms: 2
    beds: 2
    bathrooms: 1
    pricePerNight: '180.00'
    cleaningFee: '35.00'
    securityDeposit: '200.00'
    instantBooking: false
    createdAt: '<dateTimeBetween("-1 year", "-1 month")>'
