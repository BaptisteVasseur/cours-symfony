security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        users_in_database:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: users_in_database
            user_checker: App\Security\UserChecker
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                success_handler: App\Security\LoginSuccessHandler
                default_target_path: app_home
            logout:
                path: app_logout
                target: app_home
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'

    role_hierarchy:
        ROLE_USER:
        ROLE_HOST: ROLE_USER
        ROLE_MODERATEUR: ROLE_USER
        ROLE_ADMIN: [ROLE_MODERATEUR, ROLE_HOST]
        ROLE_SUPER_ADMIN: ROLE_ADMIN

    access_control:
        - { path: ^/api/docs, roles: PUBLIC_ACCESS }
        - { path: ^/api/contexts, roles: PUBLIC_ACCESS }
        - { path: ^/api/validation_errors, roles: PUBLIC_ACCESS }
        - { path: ^/api/properties/[^/]+/calendar\.ics$, roles: PUBLIC_ACCESS }
        - { path: ^/api/properties/[^/]+/availability$, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: ROLE_USER }
        - { path: ^/(login|register|aide)$, roles: PUBLIC_ACCESS }
        - { path: ^/$, roles: PUBLIC_ACCESS }
        - { path: ^/search, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/property, roles: ROLE_ADMIN }
        - { path: ^/user, roles: ROLE_ADMIN }
        - { path: ^/logement, roles: ROLE_USER }
        - { path: ^/reservations, roles: ROLE_USER }
        - { path: ^/compte, roles: ROLE_USER }
        - { path: ^/messages, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
