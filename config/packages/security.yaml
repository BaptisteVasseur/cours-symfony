security:
    password_hashers:
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                success_handler: App\Security\LoginSuccessHandler
                default_target_path: app_home
                username_parameter: _username
                password_parameter: _password
                enable_csrf: true
            logout:
                path: app_logout
                target: app_home
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800

    role_hierarchy:
        ROLE_HOST:       ROLE_USER
        ROLE_ADMIN:      ROLE_HOST
        ROLE_SUPER_ADMIN: ROLE_ADMIN

    access_control:
        - { path: ^/(login|register), roles: PUBLIC_ACCESS }
        - { path: ^/admin,        roles: ROLE_ADMIN }
        - { path: ^/host,         roles: ROLE_HOST }
        - { path: ^/property/[^/]+, roles: ROLE_USER }
        - { path: ^/reservations, roles: ROLE_USER }
        - { path: ^/booking,      roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
